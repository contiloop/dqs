language:
  src:
    code: en
    locale: en-US
    name_en: English
    name_ko: 영어
    label_en: English
    label_ko: 영어
  tgt:
    code: ko
    locale: ko-KR
    name_en: Korean
    name_ko: 한국어
    label_en: Korean
    label_ko: 한국어
    ko_name_variants:
      - value: 한국어
        weight: 0.85
      - value: 우리말
        weight: 0.10
      - value: 한글
        weight: 0.05

domain:
  name_en: economic and financial
  name_ko: 경제·금융

base_templates:
  - id: base_tem_001
    text: |
      Translate this from English to Korean:

      English:
      {src}

      Korean:

  - id: base_tem_002
    text: |
      Translate the following economic and financial text from {src_lang_name} to {tgt_lang_name}: {src}

  - id: base_tem_003
    text: |
      Translate the following economic and financial text to {tgt_lang_name}: {src}

  - id: base_tem_004
    text: |
      다음 문장을 영어에서 한국어로 번역하세요:

      영어:
      {src}

      한국어:

  - id: base_tem_005
    text: |
      다음 경제·금융 텍스트를 {src_lang_ko}에서 {tgt_lang_ko}로 번역하세요: {src}

  - id: base_tem_006
    text: |
      다음 경제·금융 텍스트를 {tgt_lang_ko}로 번역하세요: {src}

instruct_templates:
  - id: instruct_tem_001
    lang: en
    user: |
      Translate this from English to Korean:

      English:
      {src}

      Korean:

  - id: instruct_tem_002
    lang: en
    system: |
      You are a professional English-to-Korean translator for economic, financial, and corporate disclosure texts.
      Translate meaning, numbers, dates, tickers, company names, product names, units, and terminology appropriately for Korean.
      Do not add explanations, summaries, or content not present in the source.
      Output only the Korean translation.
    user: |
      Translate the following economic and financial text from English to Korean:

      Source:
      {src}

      Translation:

  - id: instruct_tem_003
    lang: en
    system: |
      You are a professional English-to-Korean translator for economic, financial, and corporate disclosure texts.
      Translate meaning, numbers, dates, tickers, company names, product names, units, and terminology appropriately for Korean.
      Do not add explanations, summaries, or content not present in the source.
      Output only the Korean translation.
    user: |
      Translate this from English to Korean:

      English:
      {src}

      Korean:

  - id: instruct_tem_004
    lang: ko
    system: |
      당신은 경제, 금융, 기업 공시 문서를 다루는 영어-한국어 전문 번역가입니다.
      의미, 숫자, 날짜, 티커, 회사명, 상품명, 단위, 전문용어를 한국어 문맥에 맞게 알맞게 번역하세요.
      원문에 없는 설명, 요약, 내용을 추가하지 마세요.
      한국어 번역문만 출력하세요.
    user: |
      다음 문장을 영어에서 한국어로 번역하세요:

      영어:
      {src}

      한국어:

  - id: instruct_tem_005
    lang: ko
    system: |
      당신은 경제, 금융, 기업 공시 문서를 다루는 영어-한국어 전문 번역가입니다.
      의미, 숫자, 날짜, 티커, 회사명, 상품명, 단위, 전문용어를 한국어 문맥에 맞게 알맞게 번역하세요.
      원문에 없는 설명, 요약, 내용을 추가하지 마세요.
      한국어 번역문만 출력하세요.
    user: |
      다음 경제·금융 텍스트를 영어에서 한국어로 번역하세요:

      원문:
      {src}

      번역:

  - id: instruct_tem_006
    lang: ko
    user: |
      {src}

      한국어로 번역해줘.
