run:
  id: gemma4_e2b_dqs_dpo_full_response_seed42
  seed: 42
  output_dir: post_training/dqs_preference_training_hf/outputs/gemma4_e2b_dqs_dpo_full_response_seed42
  require_smoke_step_receipt: true

logging:
  wandb:
    enabled: true
    strict: true
    mode: online
    project: dqs
    entity: null
    run_name: gemma4_e2b_dqs_dpo_full_response_seed42
    run_id: gemma4_e2b_dqs_dpo_full_response_seed42
    group: gemma4_e2b_dqs_dpo_full_response
    job_type: dpo-post-training
    resume: allow
    local_subdir: wandb
    log_smoke: false
    log_model: false
    watch: false
    tags:
      - dqs
      - gemma4
      - e2b
      - dpo
      - full-response
      - teacher-vs-student
      - reference-precomputed
      - full
      - en-ko
      - lr5e-6
      - cosine
      - final-source-filtered
      - seed42

model:
  name_or_path: CHANGE_ME/checkpoints/final
  revision: null
  subfolder: null
  trust_remote_code: false
  require_final_stage_model: true
  unsloth_model_api: fast_model
  expected_sft_run_id: gemma4_e2b_it_full_iter_lowqe_sf_on_seed42
  expected_sft_subset_idx: 22
  expected_sft_global_step: 184

data:
  source: local
  path: post_training/research/prepared/full_response_preference_pairs_final.jsonl
  contract_path: post_training/research/contracts/dataset_contract_full_response_preference.json
  cache_dir: post_training/research/.cache/datasets/dpo

  hf_repo_id: null
  hf_revision: null
  hf_train_filename: null
  hf_train_split: null
  hf_contract_filename: null

loss:
  objective: dpo_full_response
  trainer: UnslothDPOTrainer
  beta: 0.1
  loss_type: sigmoid
  label_smoothing: 0.0
  f_divergence_type: reverse_kl
  reference_free: false
  rpo_alpha: null
  ld_alpha: null
  loss_weights: null
  use_weighting: false
  use_liger_loss: false
  sync_ref_model: false

reference:
  mode: initial_sft_policy_precomputed
  precompute_ref_log_probs: true
  precompute_ref_batch_size: 1
  require_ref_model_none: true
  precompute_before_resume_restore: true

training:
  backend: unsloth
  dtype: bfloat16
  load_in_4bit: false
  load_in_8bit: false
  freeze_embeddings: false
  gradient_checkpointing: unsloth
  unsloth_compile: disabled
  unsloth_fullgraph: false

  max_seq_length: 2908
  max_length: 2908
  max_prompt_length: 1398
  max_completion_length: 1501
  truncation_mode: keep_end
  padding_free: false
  use_logits_to_keep: true
  dataset_num_proc: 4
  disable_dropout: true

  learning_rate: 5.0e-6
  warmup_steps: 0.1
  scheduler: cosine
  optimizer: adamw_torch
  max_grad_norm: 5.0
  weight_decay: 0.0

  num_train_epochs: 1
  max_steps: -1
  effective_batch_size: 128
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: auto

  save_strategy: steps
  save_steps: 10
  save_total_limit: 2
  logging_steps: 1
  eval_strategy: 'no'
  eval_steps: 250
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  ddp_find_unused_parameters: false
  smoke_sample_rows: 128
  report_to: []

  resume_from_checkpoint: null
