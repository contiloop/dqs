run:
  id: gemma4_e2b_dqs_mpo_setting5_seed42
  seed: 42
  # Kept separate from the iterative SFT run on purpose.
  output_dir: post_training/dqs_preference_training_hf/outputs/gemma4_e2b_dqs_mpo_setting5_seed42
  # A one-step run in this exact environment/model/data contract must succeed
  # before the full run is allowed to start.
  require_smoke_step_receipt: true

logging:
  # The full train and its later val/final eval reopen this one stable run.
  # W&B is deliberately not delegated to Transformers' built-in callback,
  # because that callback rewrites our train/* keys a second time.
  wandb:
    enabled: true
    strict: true
    mode: online
    project: dqs
    entity: null
    run_name: gemma4_e2b_dqs_mpo_setting5_seed42
    run_id: gemma4_e2b_dqs_mpo_setting5_seed42
    group: gemma4_e2b_dqs_mpo_setting5
    job_type: mpo-post-training
    resume: allow
    local_subdir: wandb
    # Smoke still checks the exact W&B package/code contract, but it never
    # creates or appends to the full W&B run.
    log_smoke: false
    # No checkpoint/model artifact upload and no per-parameter watch hooks.
    log_model: false
    watch: false
    tags:
      - dqs
      - gemma4
      - e2b
      - mpo
      - setting5
      - full
      - en-ko
      - lr5e-6
      - cosine
      - final-source-filtered
      - seed42

model:
  # Replace this on the external instance with the downloaded SFT
  # checkpoints/final directory. Do not point it at checkpoint-184, because
  # the SFT optimizer/scheduler must not be resumed into post-training.
  name_or_path: CHANGE_ME/checkpoints/final
  revision: null
  subfolder: null
  trust_remote_code: false
  require_final_stage_model: true
  unsloth_model_api: fast_model
  expected_sft_run_id: gemma4_e2b_it_full_iter_lowqe_sf_on_seed42
  expected_sft_subset_idx: 22
  expected_sft_global_step: 184

data:
  # Rebuilt directly from all 23 raw golden_pairs subsets. The strict
  # character/token stage produced 5,505 rows; exhaustive source review then
  # retained 5,201 source-quality KEEP rows. One internally inconsistent
  # identical Teacher/Student annotation is then fail-closed, leaving 5,200
  # preference rows. No repair or fallback is used in either stage.
  # The standalone release downloads the exact Hub commit with
  # `make download-data`; trainer processes only read this local file.
  source: local
  path: post_training/research/prepared/mpo_tokenized_pairs_final_source_filtered.jsonl
  eval_path: null
  contract_path: post_training/research/contracts/dataset_contract_final_source_filtered.json
  cache_dir: post_training/research/.cache/datasets/mpo

  hf_repo_id: null
  hf_revision: null
  hf_config_name: null
  hf_train_filename: null
  hf_eval_filename: null
  hf_train_split: null
  hf_eval_split: null
  hf_contract_filename: null

evaluation:
  # Reuse the existing DQS evaluator, but force both the trained model and all
  # outputs to remain inside this post-training run. `val` is the comparable
  # profile used after the source iterative SFT; `final` can be selected later.
  base_config: configs/config.yaml
  model_profile: gemma4_e2b_it
  training_profile: full
  default_profile: val
  output_subdir: eval

loss:
  # This two-term objective is paper setting 5, not setting 6.
  paper_setting: 5
  # Atomic losses are unweighted; coefficients are applied exactly once.
  lambda_sft: 10.0
  lambda_mpo: 1.0
  preference_beta: 0.25       # target margin = 1 / (2 beta) = 2.0
  smooth_l1_delta: 1.0       # Eq. (2) transition; not preference beta

training:
  backend: unsloth
  dtype: bfloat16
  load_in_4bit: false
  load_in_8bit: false
  # false keeps full text-model fine-tuning. true freezes input token
  # embeddings; if the LM head shares that weight, the shared head is frozen.
  freeze_embeddings: false
  gradient_checkpointing: unsloth
  # Gemma4 E2B shared-KV requires non-reentrant checkpointing. Keep Unsloth's
  # loader, patches and fused kernels, but disable torch.compile so checkpoint
  # recomputation cannot select a different compiled decoder-layer variant.
  unsloth_compile: disabled
  # Selected-position tensor lengths vary by row; avoid requiring one static
  # full graph around the whole forward.
  unsloth_fullgraph: false
  max_seq_length: 2908

  # Mandatory contract: chosen completion positions + rejected term positions
  # only. If tensor logits_to_keep is not honored, training fails immediately.
  # There is no full-logits or backend fallback.
  logits_projection: selected
  # Required FP32 per-token CE/logsumexp kernel for Gemma's large vocabulary.
  # Missing or incompatible kernels are a hard error.
  token_logp_backend: unsloth_fused

  # Start 4x below the source iterative full-SFT peak LR (2e-5) for localized
  # full-model post-training. The remaining optimizer schedule follows the SFT
  # run, but optimizer/scheduler state is initialized fresh.
  learning_rate: 5.0e-6
  # Transformers v5 interprets a float below 1 as a ratio of total steps.
  warmup_steps: 0.1
  scheduler: cosine
  optimizer: adamw_torch
  max_grad_norm: 5.0
  weight_decay: 0.0

  # Pilot default. The paper allowed 20 epochs only with generated term-
  # accuracy early stopping; this trainer intentionally does not fake that
  # criterion with validation loss.
  num_train_epochs: 1
  max_steps: -1
  # Match the source SFT's global optimization batch. Keep the micro-batch at
  # one because each preference pair expands to two sequences in one
  # concatenated forward; gradient accumulation resolves the same global batch
  # without assuming the source SFT's one-sequence memory footprint.
  effective_batch_size: 128
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: auto

  save_strategy: steps
  save_steps: 10
  save_total_limit: 2
  logging_steps: 1
  eval_strategy: 'no'
  eval_steps: 250
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  ddp_find_unused_parameters: false
  # Must stay empty. The deployment runtime's mpo_wandb.py owns logging so metric names
  # are preserved exactly and any W&B failure aborts the run.
  report_to: []

  # null means: initialize weights from model.name_or_path, but create a fresh
  # post-training optimizer/scheduler/global step. 'auto' may resume only from
  # checkpoint-* under this run.output_dir.
  resume_from_checkpoint: null
