training:
  backend: unsloth
  allow_hf_backend: false
  tuning_mode: full
  dtype: auto
  load_in_4bit: false
  load_in_8bit: false
  gradient_checkpointing: unsloth
  learning_rate: 0.00002
  warmup_ratio: 0.1
  scheduler: cosine
  stage_planned_rows_per_subset: ${data.teacher_target_per_subset}
  optimizer: adamw_torch
  max_grad_norm: 5.0
  weight_decay: 0.0
  num_train_epochs: 1
  max_steps: -1
  save_strategy: steps
  save_steps: 100
  save_total_limit: null
  logging_steps: 1
  dataloader_num_workers: 4
  dataloader_shuffle: true
  resume_from_checkpoint: auto
  append_eos_token: true
  response_only_loss: true
  effective_batch_size: 128
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: auto
  packing: false
  lora: null
  train_vision_layers: false
  full_finetuning: true
  optimizer_resume_required: true
  scheduler_resume_required: true
  global_step_resume_required: true
  save_optimizer_state: true
  save_scheduler_state: true
  save_adapter: false
  save_merged_model: false
  merge_smoke_test_required: false
  merge_smoke_test_mode: config_and_tokenizer
  save_final_model: true
  save_full_model: true
  normalize_full_weight_checkpoint_keys: true
  assert_full_weight_checkpoint_keys: true
  max_seq_length: null
  prompt_overhead_tokens: 128
  prevent_template_truncation: true
