model:
  name_or_path: google/gemma-4-E2B-it
  prepared_dataset_repo: alwaysgood/financial-english-source-corpus-gemma4-e2b-1280
  prepared_dataset_slug: financial-english-source-corpus-gemma4-e2b-1280
  family: gemma4
  size: e2b
  variant: instruct
  # Gemma 4 is multimodal, but DQS uses its text path only.
  is_vision_model: true
  # Match Unsloth's official Gemma 4 text notebook. In Unsloth 2026.7.2,
  # FastVisionModel subclasses FastModel without overriding its dispatch.
  unsloth_model_api: fast_model
  trust_remote_code: false
  use_hf_chat_template: true
  enable_thinking: false
  require_thinking_control: false
  # Gemma 4 uses reentrant activation checkpointing. PyTorch DDP requires
  # unused-parameter traversal to be disabled for that path.
  ddp_find_unused_parameters: false
  vllm_limit_mm_per_prompt:
    image: 0
    audio: 0
  tokenizer_revision: main
