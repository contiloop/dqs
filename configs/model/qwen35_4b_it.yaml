model:
  name_or_path: unsloth/Qwen3.5-4B
  prepared_dataset_repo: alwaysgood/financial-english-source-corpus-qwen35-1280
  prepared_dataset_slug: financial-english-source-corpus-qwen35-1280
  family: qwen3.5
  size: 4b
  variant: instruct
  is_vision_model: true
  trust_remote_code: true
  use_hf_chat_template: true
  enable_thinking: false
  require_thinking_control: true
  tokenizer_revision: main
  # Text-only SFT freezes non-text parameters, so every remaining trainable
  # parameter participates in the loss graph. Unsloth's reentrant activation
  # checkpointing requires DDP unused-parameter traversal to stay disabled.
  ddp_find_unused_parameters: false
