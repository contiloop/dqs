eval:
  profile: final
  dataset_path: data/test.jsonl
  output_dir: ${paths.artifact_root}/eval/${eval.profile}
  source_field: ${data.source_field}
  target_field: ${data.target_field}
  metadata_field: ${data.metadata_field}
  limit: null
  generation:
    model_path: auto
    max_new_tokens: 1024
    temperature: 0.0
    top_p: 1.0
    num_gpus: 1
    tensor_parallel_size: 1
    gpu_memory_utilization: ${inference.gpu_memory_utilization}
  filter:
    enabled: true
  metrics:
    - id: bleu
      backend: sacrebleu
      metric: bleu
      requires_reference: true
    - id: chrf
      backend: sacrebleu
      metric: chrf
      requires_reference: true
    - id: comet_wmt22_da
      backend: comet
      model: Unbabel/wmt22-comet-da
      requires_reference: true
      python_env_var: COMET_PYTHON
      batch_size: 512
    - id: xcomet_xxl
      backend: comet
      model: Unbabel/XCOMET-XXL
      requires_reference: true
      python_env_var: COMET_PYTHON
      batch_size: 16
    - id: metricx_24_hybrid_xxl
      backend: metricx
      model: google/metricx-24-hybrid-xxl-v2p6-bfloat16
      tokenizer: google/mt5-xl
      requires_reference: true
      python_env_var: METRICX_PYTHON
      module: metricx24.predict
      max_input_length: 1536
      batch_size: 1
