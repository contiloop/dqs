suite:
  name: openrouter_api
  eval_config: configs/config.yaml
  eval_profile: final
  output_dir: outputs/results
  metrics: bleu,chrf
  max_new_tokens: 1024
  temperature: 0.0
  top_p: 1.0

openrouter:
  api_key_env: OPENROUTER_API_KEY
  base_url: https://openrouter.ai/api/v1/chat/completions
  app_name: DQS Eval
  concurrency: 4
  timeout_s: 120
  max_retries: 5
  retry_sleep_s: 2.0
  reasoning_effort: none
  reasoning:
    enabled: false
    effort: none
    exclude: true

